{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <title>{% block title %}Portfolio{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
       :root {
            --bg-color: #0f0f0f;
            --accent-color: #e87a4b; /* Similar to the '01-ABOUT' text in your image */
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }
        body {
            background-color: #0f0f0f;
            /* Matching your dark aesthetic */
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .navbar-dark .navbar-nav .nav-link {
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .navbar-dark .navbar-nav .nav-link:hover {
            color: #e87a4b; /* Your accent color */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">PORTFOLIO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/bio/">Bio</a></li>
                    <li class="nav-item"><a class="nav-link" href="/education/">Education</a></li>
                    <li class="nav-item"><a class="nav-link" href="/skills/">Skills</a></li>
                    <li class="nav-item"><a class="nav-link" href="/experience/">Experience</a></li>
                    <li class="nav-item"><a class="nav-link" href="/projects/">Projects</a></li>

                </ul>
            </div>
        </div>
    </nav>


        {% block content %}
        {% endblock %}


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
